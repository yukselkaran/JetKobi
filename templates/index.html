<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JetKobi — Akıllı KOBİ Asistanı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --card: #1a2235;
            --border: #1f2d45;
            --accent: #00d4aa;
            --accent2: #3b82f6;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: 'Space Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── LOGIN ── */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .login-wrap { width: 100%; max-width: 420px; padding: 20px; }

        .login-logo { text-align: center; margin-bottom: 40px; }
        .login-logo .wordmark {
            font-family: var(--mono);
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -2px;
        }
        .login-logo .tagline {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
        }
        .login-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            margin-bottom: 24px;
            font-family: var(--sans);
            letter-spacing: 0.5px;
        }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.9rem;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #0a0e1a;
            border: none;
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 1px;
            transition: opacity .2s, transform .1s;
        }
        .btn-login:hover { opacity: .9; }
        .btn-login:active { transform: scale(.98); }

        .login-hint {
            margin-top: 20px;
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--muted);
            font-family: var(--mono);
            line-height: 1.8;
        }
        .login-error {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        /* ── APP SHELL ── */
        #mainApp { display: none; height: 100vh; flex-direction: column; }

        /* Top Bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .topbar-brand {
            font-family: var(--mono);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }

        .role-badge {
            font-family: var(--mono);
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .role-badge.kobi {
            background: rgba(0, 212, 170, .15);
            color: var(--accent);
            border: 1px solid rgba(0, 212, 170, .3);
        }
        .role-badge.musteri {
            background: rgba(59, 130, 246, .15);
            color: var(--accent2);
            border: 1px solid rgba(59, 130, 246, .3);
        }

        /* Layout */
        .app-body { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar-title {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0 8px;
            margin-bottom: 4px;
        }
        .quick-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.85rem;
            cursor: pointer;
            text-align: left;
            transition: background .15s;
        }
        .quick-btn:hover { background: var(--card); }
        .quick-btn .icon { font-size: 1rem; width: 22px; text-align: center; }

        /* Stock widget */
        .stock-widget {
            margin-top: auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }
        .stock-widget-title {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            font-size: 0.8rem;
        }
        .stock-bar-wrap {
            flex: 1;
            margin: 0 8px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .stock-bar {
            height: 100%;
            border-radius: 2px;
            transition: width .5s;
        }
        .stock-bar.ok   { background: var(--accent); }
        .stock-bar.warn { background: var(--warn); }
        .stock-bar.crit { background: var(--danger); }

        /* Chat */
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .empty-state { margin: auto; text-align: center; opacity: .4; }
        .empty-state .big-icon { font-size: 3rem; }
        .empty-state p { font-size: 0.85rem; color: var(--muted); margin-top: 8px; }

        .msg-row {
            display: flex;
            gap: 12px;
            max-width: 800px;
            animation: msgIn .2s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .msg-avatar.bot     { background: rgba(0, 212, 170, .15); }
        .msg-avatar.user-av { background: rgba(59, 130, 246, .15); }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
            max-width: 100%;
        }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.85rem;
            background: var(--bg);
            border-radius: 8px;
            overflow: hidden;
        }
        .msg-bubble th, .msg-bubble td {
            border: 1px solid var(--border);
            padding: 10px 14px;
            text-align: left;
        }
        .msg-bubble th {
            background: rgba(0, 212, 170, 0.1);
            color: var(--accent);
            font-family: var(--mono);
            font-weight: bold;
        }
        .msg-bubble strong { color: var(--accent2); }

        .msg-row.bot .msg-bubble {
            background: var(--card);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }
        .msg-row.user .msg-bubble {
            background: var(--accent2);
            color: white;
            border-top-right-radius: 4px;
            white-space: pre-wrap;
        }
        .msg-bubble.report {
            font-family: var(--mono);
            font-size: 0.8rem;
            background: var(--bg);
            border-color: var(--accent);
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            border-top-left-radius: 4px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce .8s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: .15s; }
        .typing-indicator span:nth-child(3) { animation-delay: .30s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(1); opacity: .4; }
            40%            { transform: scale(1.2); opacity: 1; }
        }

        /* Input bar */
        .input-bar {
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-bar input {
            flex: 1;
            padding: 12px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.9rem;
            outline: none;
            transition: border-color .2s;
        }
        .input-bar input:focus { border-color: var(--accent); }
        .input-bar input::placeholder { color: var(--muted); }

        .btn-send {
            padding: 12px 20px;
            background: var(--accent);
            color: #0a0e1a;
            border: none;
            border-radius: 10px;
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn-send:hover { opacity: .85; }
        .btn-send:disabled { opacity: .4; cursor: not-allowed; }
    </style>
</head>

<body>

    <!-- ── LOGIN ── -->
    <div id="loginOverlay">
        <div class="login-wrap">
            <div class="login-logo">
                <div class="wordmark">⚡ JetKobi</div>
                <div class="tagline">Akıllı KOBİ Asistanı</div>
            </div>
            <div class="login-card">
                <h3>Giriş Yap</h3>
                <div class="field">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="username" placeholder="Kullanıcı Adı"
                        onkeydown="if(event.key==='Enter') doLogin()">
                </div>
                <div class="field">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="••••••"
                        onkeydown="if(event.key==='Enter') doLogin()">
                </div>
                <button class="btn-login" onclick="doLogin()">Giriş Yap →</button>
                <div class="login-error" id="loginError">Hatalı kullanıcı adı veya şifre.</div>
            </div>
            <div class="login-hint">
                KOBİ yöneticisi: kobi / 123<br>
                Müşteri girişleri username / password: ahmet / 456, ayse / 789, mehmet / 321, fatma / 654
            </div>
        </div>
    </div>

    <!-- ── MAIN APP ── -->
    <div id="mainApp">
        <div class="topbar">
            <div class="topbar-brand">⚡ JetKobi</div>
            <!-- Sadece rol badge'i, isim yok -->
            <span class="role-badge" id="roleBadge"></span>
        </div>

        <div class="app-body">
            <!-- Sidebar (KOBİ only) -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-title">Hızlı İşlemler</div>
                <button class="quick-btn" onclick="sendQuick('Sabah raporunu hazırla')">
                    <span class="icon">📊</span> Günlük Rapor
                </button>
                <button class="quick-btn" onclick="sendQuick('Kritik stokları göster')">
                    <span class="icon">⚠️</span> Stok Uyarıları
                </button>
                <button class="quick-btn" onclick="sendQuick('Tüm siparişleri listele')">
                    <span class="icon">📋</span> Tüm Siparişler
                </button>
                <button class="quick-btn" onclick="sendQuick('Bugün hazırlanması gereken siparişler hangileri?')">
                    <span class="icon">📦</span> Bekleyen Paketler
                </button>

                <div class="stock-widget">
                    <div class="stock-widget-title">Stok Durumu</div>
                    <div id="stockBars">
                        <div class="stock-item" style="font-size:.75rem;color:var(--muted)">Yükleniyor...</div>
                    </div>
                </div>
            </div>

            <!-- Chat -->
            <div class="chat-area">
                <div class="chat-messages" id="chatBox">
                    <div class="empty-state" id="emptyState">
                        <div class="big-icon">⚡</div>
                        <p>Merhaba! Sana nasıl yardımcı olabilirim?</p>
                    </div>
                </div>

                <div class="msg-row bot" id="typingRow" style="display:none; padding:0 24px 8px;">
                    <div class="msg-avatar bot">🤖</div>
                    <div class="typing-indicator" style="display:flex;">
                        <span></span><span></span><span></span>
                    </div>
                </div>

                <div class="input-bar">
                    <input type="text" id="userInput" placeholder="Mesajınızı yazın..."
                        onkeydown="if(event.key==='Enter') sendMessage()">
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">Gönder</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "";
        let currentRole = "";
        let currentToken = "";

        // Stok güncelleyebilecek komut anahtar kelimeleri
        const STOCK_UPDATE_KEYWORDS = [
            'stok', 'arttır', 'azalt', 'güncelle', 'ekle', 'çıkar',
            'kg', 'adet', 'miktar', 'envanter'
        ];

        function mightUpdateStock(message) {
            const lower = message.toLowerCase();
            return STOCK_UPDATE_KEYWORDS.some(kw => lower.includes(kw));
        }

        async function renderStockBars() {
            const container = document.getElementById('stockBars');
            try {
                const res = await fetch(`/stocks?token=${encodeURIComponent(currentToken)}`);
                if (!res.ok) {
                    container.innerHTML = '<div class="stock-item" style="font-size:.75rem;color:var(--muted)">Stok yüklenemedi.</div>';
                    return;
                }
                const stocks = await res.json();
                container.innerHTML = Object.entries(stocks).map(([name, s]) => {
                    const pct = Math.min(100, Math.round(s.miktar / (s.esik * 2) * 100));
                    const cls = s.miktar <= s.esik
                        ? (s.miktar <= s.esik * 0.5 ? 'crit' : 'warn')
                        : 'ok';
                    return `<div class="stock-item">
                        <span style="width:62px;font-size:.75rem">${name}</span>
                        <div class="stock-bar-wrap">
                            <div class="stock-bar ${cls}" style="width:${pct}%"></div>
                        </div>
                        <span style="font-size:.7rem;color:var(--muted);font-family:var(--mono)">${s.miktar}</span>
                    </div>`;
                }).join('');
            } catch {
                container.innerHTML = '<div class="stock-item" style="font-size:.75rem;color:var(--muted)">Bağlantı hatası.</div>';
            }
        }

        async function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (res.ok) {
                    const data = await res.json();
                    currentUser = u;
                    currentRole = data.role;
                    currentToken = data.token;

                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'flex';

                    // Sadece rol badge'i göster, isim yok
                    const badge = document.getElementById('roleBadge');
                    badge.textContent = data.role;
                    badge.className = 'role-badge ' + (data.role === 'KOBİ' ? 'kobi' : 'musteri');

                    if (data.role !== 'KOBİ') {
                        document.getElementById('sidebar').style.display = 'none';
                    } else {
                        renderStockBars();
                    }

                    const welcome = data.role === 'KOBİ'
                        ? `Hoş geldin! 📊 Sabah raporunu hazırlamamı ister misin?\nYa da hızlı işlemler panelini kullanabilirsin.`
                        : `Merhaba ${data.name}! 👋\nSipariş durumunu öğrenmek için sipariş numaranı yazabilirsin.`;
                    addMessage(welcome, 'bot');
                } else {
                    errEl.style.display = 'block';
                }
            } catch {
                errEl.textContent = 'Sunucuya bağlanılamıyor.';
                errEl.style.display = 'block';
            }
        }

        function addMessage(text, side) {
            const chatBox = document.getElementById('chatBox');
            document.getElementById('emptyState')?.remove();

            const isReport = text.includes('RAPOR') || text.includes('━') || text.includes('📊');
            const avatarEmoji = side === 'bot' ? '🤖' : '👤';
            const avatarCls = side === 'bot' ? 'bot' : 'user-av';
            const bubbleCls = isReport ? 'msg-bubble report' : 'msg-bubble';

            let formattedText;
            if (side === 'bot') {
                formattedText = marked.parse(text);
            } else {
                formattedText = escapeHtml(text);
            }

            const row = document.createElement('div');
            row.className = `msg-row ${side}`;
            row.innerHTML = `
                <div class="msg-avatar ${avatarCls}">${avatarEmoji}</div>
                <div class="${bubbleCls}">${formattedText}</div>
            `;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function setLoading(state) {
            document.getElementById('typingRow').style.display = state ? 'flex' : 'none';
            document.getElementById('sendBtn').disabled = state;
            document.getElementById('userInput').disabled = state;
            if (!state) {
                document.getElementById('chatBox').scrollTop =
                    document.getElementById('chatBox').scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            const couldUpdateStock = currentRole === 'KOBİ' && mightUpdateStock(message);

            addMessage(message, 'user');
            input.value = '';
            setLoading(true);

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, token: currentToken })
                });
                const data = await res.json();
                addMessage(data.response || data.detail || 'İstek tamamlanamadı.', 'bot');

                // Stok değişmiş olabilirse widget'ı yenile
                if (couldUpdateStock) {
                    renderStockBars();
                }
            } catch {
                addMessage('Sunucuya bağlanılamadı. Lütfen tekrar deneyin.', 'bot');
            } finally {
                setLoading(false);
            }
        }

        function sendQuick(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }
    </script>
</body>

</html>
